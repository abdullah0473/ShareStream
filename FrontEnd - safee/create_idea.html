<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - ShareStream</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="site-header border-bottom">
  <div class="container header-inner d-flex justify-content-between align-items-center">

    <a class="logo fw-bold text-decoration-none" href="#">
      ShareStream
    </a>

    <nav class="nav-links d-flex align-items-center gap-3">
      <a href="#">Home</a>
      <a href="#">Explore Ideas</a>
      <a href="#">Dashboard</a>
      <a href="#">Profile</a>
      <a href="#" class="btn btn-sm btn-outline-secondary">Logout</a>
    </nav>

  </div>
</header>

<!-- FORM SECTION -->
<div class="form-wrapper">
  <h2>Create Idea</h2>

  <form method="post" enctype="multipart/form-data">

    <div class="form-group mb-3">
      <label>Category</label>
      <select class="form-control">
        <option>Select Category</option>
        <option>Technology</option>
        <option>Business</option>
        <option>Marketing</option>
        <option>Design</option>
      </select>
    </div>

    <div class="form-group mb-3">
      <label>Title</label>
      <input type="text" class="form-control" placeholder="Enter idea title">
    </div>

    <div class="form-group mb-3">
      <label>Summary</label>
      <textarea class="form-control" rows="3" placeholder="Short summary of your idea"></textarea>
    </div>

    <div class="form-group mb-3">
      <label>Description</label>
      <textarea class="form-control" rows="6" placeholder="Full description of your idea"></textarea>
    </div>

    <div class="form-group mb-4">
      <label>Cover Image (optional)</label>
      <input type="file" class="form-control">
    </div>

    <button class="btn btn-primary" type="submit">
      Create Idea
    </button>

  </form>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="container footer-grid">
    <div>
      <h5>ShareStream</h5>
      <p>Idea sharing and voting platform.</p>
    </div>
    <div>
      <h6>Platform</h6>
      <a href="#">Trending</a><br>
      <a href="#">Categories</a>
    </div>
    <div>
      <h6>Social</h6>
      <i class="fab fa-github"></i>
      <i class="fab fa-twitter"></i>
    </div>
  </div>
  <p class="copyright">© 2026 ShareStream</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
